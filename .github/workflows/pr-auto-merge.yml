name: PR Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: pr-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: read
  contents: write
  packages: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  SHARED_RUNNER_COMMAND: "npm exec --yes --package @takahiro-shimizu-1/automation-runner@0.1.17 -- automation-runner"
  SHARED_RUNNER_PACKAGE_SCOPE: "@takahiro-shimizu-1"
  SHARED_RUNNER_REGISTRY_URL: "https://npm.pkg.github.com"
  NODE_AUTH_TOKEN: ${{ secrets.AUTOMATION_RUNNER_PACKAGE_TOKEN || github.token }}

jobs:
  auto-merge:
    if: ${{ 'review-and-pr' == 'review-and-pr' || 'review-and-pr' == 'deploy-enabled' }}
    name: PR Auto Merge
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.SHARED_RUNNER_REGISTRY_URL }}
          scope: ${{ env.SHARED_RUNNER_PACKAGE_SCOPE }}

      - name: Wait for ci-summary on current head SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHECK_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          $SHARED_RUNNER_COMMAND wait-for-check \
            --ref "$CHECK_REF" \
            --workflow "CI" \
            --event "pull_request" \
            --timeout-ms 1800000

      - name: Wait for PR Review Gate on current head SHA
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHECK_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          $SHARED_RUNNER_COMMAND wait-for-check \
            --ref "$CHECK_REF" \
            --workflow "PR Review Gate" \
            --event "pull_request" \
            --timeout-ms 1800000

      - name: Evaluate auto-merge eligibility
        id: evaluate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MIYABI_LEDGER_PR_MARKER_MODE: ${{ vars.MIYABI_LEDGER_PR_MARKER_MODE || 'observe' }}
        run: |
          $SHARED_RUNNER_COMMAND pr-auto-merge > /tmp/pr-auto-merge.json
          cat /tmp/pr-auto-merge.json
          can_merge="$(node -e 'const fs=require("fs");const json=JSON.parse(fs.readFileSync("/tmp/pr-auto-merge.json","utf8")); process.stdout.write(json.canMerge ? "true" : "false");')"
          pr_number="$(node -e 'const fs=require("fs");const json=JSON.parse(fs.readFileSync("/tmp/pr-auto-merge.json","utf8")); process.stdout.write(String(json.prNumber || ""));')"
          {
            echo 'decision<<EOF'
            cat /tmp/pr-auto-merge.json
            echo 'EOF'
            echo "can_merge=${can_merge}"
            echo "pr_number=${pr_number}"
          } >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.evaluate.outputs.can_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
        run: |
          PR_NUMBER="${{ steps.evaluate.outputs.pr_number }}"
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --auto --merge

      - name: Fallback manual merge
        if: steps.evaluate.outputs.can_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
        run: |
          PR_NUMBER="${{ steps.evaluate.outputs.pr_number }}"
          sleep 10
          PR_STATE="$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state -q .state)"
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --merge --delete-branch
          fi

      - name: Wait for merged state
        if: steps.evaluate.outputs.can_merge == 'true'
        id: merged
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.evaluate.outputs.pr_number }}
        run: |
          $SHARED_RUNNER_COMMAND wait-for-pr-merge \
            --pr "$PR_NUMBER" \
            --timeout-ms 300000 > /tmp/pr-merge-state.json
          cat /tmp/pr-merge-state.json
          merged="$(node -e 'const fs=require("fs");const json=JSON.parse(fs.readFileSync("/tmp/pr-merge-state.json","utf8")); process.stdout.write(json.merged ? "true" : "false");')"
          {
            echo 'result<<EOF'
            cat /tmp/pr-merge-state.json
            echo 'EOF'
            echo "merged=${merged}"
          } >> "$GITHUB_OUTPUT"

      - name: Fail if merge did not complete
        if: steps.evaluate.outputs.can_merge == 'true' && steps.merged.outputs.merged != 'true'
        run: |
          echo "PR #${{ steps.evaluate.outputs.pr_number }} did not reach merged state after auto-merge." >&2
          exit 1

      - name: Record Execution Ledger merge evidence
        if: steps.merged.outputs.merged == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          DECISION_JSON: ${{ steps.evaluate.outputs.decision }}
          MERGE_JSON: ${{ steps.merged.outputs.result }}
          LEDGER_MARKER_MODE: ${{ vars.MIYABI_LEDGER_PR_MARKER_MODE || 'observe' }}
        run: |
          task_id="$(node -e 'const j=JSON.parse(process.env.DECISION_JSON||"{}"); process.stdout.write(j.ledgerMarker?.marker?.taskId || "");')"
          issue_number="$(node -e 'const j=JSON.parse(process.env.DECISION_JSON||"{}"); process.stdout.write(String(j.publishDecision?.issueNumber || ""));')"
          pr_number="$(node -e 'const j=JSON.parse(process.env.MERGE_JSON||"{}"); process.stdout.write(String(j.number || ""));')"
          head_ref="$(node -e 'const j=JSON.parse(process.env.MERGE_JSON||"{}"); const d=JSON.parse(process.env.DECISION_JSON||"{}"); process.stdout.write(j.headRefName || d.ledgerMarker?.marker?.branch || "");')"
          base_ref="$(node -e 'const j=JSON.parse(process.env.MERGE_JSON||"{}"); const d=JSON.parse(process.env.DECISION_JSON||"{}"); process.stdout.write(j.baseRefName || d.ledgerMarker?.marker?.baseBranch || "");')"
          merge_commit_sha="$(node -e 'const j=JSON.parse(process.env.MERGE_JSON||"{}"); process.stdout.write(j.mergeCommitSha || "");')"
          merged_at="$(node -e 'const j=JSON.parse(process.env.MERGE_JSON||"{}"); process.stdout.write(j.mergedAt || "");')"

          if [ -z "$task_id" ] || [ -z "$pr_number" ] || [ -z "$merge_commit_sha" ]; then
            echo "Skipping Ledger merge evidence because task_id, pr_number, or merge_commit_sha is missing."
            exit 0
          fi

          ref_args=()
          if [ -n "$head_ref" ]; then
            ref_args+=(--head-ref "$head_ref")
          fi
          if [ -n "$base_ref" ]; then
            ref_args+=(--base-ref "$base_ref")
          fi
          if [ -n "$merged_at" ]; then
            ref_args+=(--merged-at "$merged_at")
          fi
          issue_args=()
          if [ -n "$issue_number" ]; then
            issue_args+=(--issue-closed-by-pr)
          fi

          set +e
          $SHARED_RUNNER_COMMAND ledger record-merge \
            --store-root "$GITHUB_WORKSPACE" \
            --repo "$GITHUB_REPOSITORY" \
            --task-id "$task_id" \
            --pr-number "$pr_number" \
            "${ref_args[@]}" \
            --merge-commit-sha "$merge_commit_sha" \
            "${issue_args[@]}" \
            --actor pr-auto-merge \
            --idempotency-key "pr-auto-merge:${GITHUB_REPOSITORY}:${pr_number}:merge:${merge_commit_sha}" \
            --source-run-id "$GITHUB_RUN_ID" \
            --json
          ledger_status=$?
          set -e
          if [ "$ledger_status" -ne 0 ]; then
            if [ "$LEDGER_MARKER_MODE" = "enforce" ]; then
              exit "$ledger_status"
            fi
            echo "::warning::Execution Ledger merge evidence was not recorded; continuing because marker mode is ${LEDGER_MARKER_MODE}."
          fi

      - name: Classify linked issues for direct merge sync
        if: steps.merged.outputs.merged == 'true'
        id: issue-links
        env:
          PULL_REQUEST_BODY: ${{ github.event.pull_request.body }}
        run: |
          closing_targets="$($SHARED_RUNNER_COMMAND pr-issue-links closing-targets)"
          echo "closing_targets=${closing_targets}" >> "$GITHUB_OUTPUT"

      - name: Sync merged issues immediately
        if: steps.merged.outputs.merged == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.evaluate.outputs.pr_number }}
        run: |
          $SHARED_RUNNER_COMMAND merge-sync --pr "$PR_NUMBER"

      - name: Reconcile parent issue truth immediately
        if: steps.merged.outputs.merged == 'true' && steps.issue-links.outputs.closing_targets != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROJECT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $SHARED_RUNNER_COMMAND issue-reconcile --issues="${{ steps.issue-links.outputs.closing_targets }}"

      - name: Summary
        if: steps.evaluate.outputs.decision != ''
        env:
          DECISION_JSON: ${{ steps.evaluate.outputs.decision }}
        run: |
          node <<'NODE'
          const decision = JSON.parse(process.env.DECISION_JSON || 'null');
          if (!decision) {
            process.exit(0);
          }

          const lines = [
            '## PR Auto Merge',
            '',
            `- PR: #${decision.prNumber}`,
            `- Publish status: ${decision.publishDecision?.status || 'unknown'}`,
            `- Can merge: ${decision.canMerge}`,
            `- Mergeable: ${String(decision.mergeable)}`,
            `- Mergeable state: ${decision.mergeableState || 'unknown'}`,
            `- Ledger marker mode: ${decision.ledgerMarker?.mode || 'unknown'}`,
            `- Ledger marker valid: ${String(decision.ledgerMarker?.valid ?? false)}`,
            `- Ledger binding valid: ${String(decision.ledgerBinding?.valid ?? false)}`,
            `- ImpactDecision: ${decision.impactDecision?.decisionId || 'not-detected'}`,
            `- ImpactDecision valid: ${String(decision.impactDecision?.valid ?? true)}`,
            `- Required repos: ${(decision.impactDecision?.requiredRepos || []).join(', ') || 'none'}`,
            `- Reasons: ${(decision.reasons || []).join(' | ') || 'none'}`,
          ];

          require('node:fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE
